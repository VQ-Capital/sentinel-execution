// ========== DOSYA: sentinel-execution/proto/execution.proto ==========
syntax = "proto3";
package sentinel.execution.v1;

message TradeSignal {
  string symbol = 1;
  enum SignalType {
    SIGNAL_TYPE_UNSPECIFIED = 0;
    SIGNAL_TYPE_HOLD = 1;
    SIGNAL_TYPE_STRONG_BUY = 2;
    SIGNAL_TYPE_BUY = 3;
    SIGNAL_TYPE_SELL = 4;
    SIGNAL_TYPE_STRONG_SELL = 5;
  }
  SignalType type = 2;
  double confidence_score = 3;
  double recommended_leverage = 4;
  int64 timestamp = 5;
  string reason = 6;
}

message ExecutionReport {
  string symbol = 1;
  string side = 2;
  double expected_price = 3;
  double execution_price = 4;
  double quantity = 5;
  double realized_pnl = 6;
  double commission = 7;
  int64 latency_ms = 8;
  int64 timestamp = 9;
  bool is_simulated = 10;
}
